<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SerenityFlow</title>
    <link rel="stylesheet" href="css/canvas.css">
</head>
<body>
    <!-- Toolbar -->
    <div id="toolbar">
        <div class="toolbar-left">
            <span class="logo">SerenityFlow</span>
        </div>
        <div class="toolbar-center">
            <button id="btn-queue" title="Queue Prompt (Ctrl+Enter)">&#9654; Queue</button>
            <button id="btn-interrupt" title="Interrupt">&#9209; Stop</button>
            <button id="btn-clear-queue" title="Clear Queue">Clear</button>
        </div>
        <div class="toolbar-right">
            <button id="btn-save" title="Save Workflow (Ctrl+S)">Save</button>
            <button id="btn-load" title="Load Workflow (Ctrl+O)">Load</button>
            <select id="template-select" title="Load Template">
                <option value="">Templates...</option>
                <option value="workflows/ltx2_t2v.json">LTX2 Text-to-Video</option>
            </select>
            <span id="status-indicator" class="status-idle">&#9679;</span>
            <span id="queue-count">0</span>
        </div>
    </div>

    <!-- Main layout -->
    <div id="main">
        <!-- Sidebar: node library -->
        <div id="sidebar">
            <input type="text" id="node-search" placeholder="Search nodes..." autocomplete="off">
            <div id="node-list"></div>
        </div>

        <!-- Canvas container -->
        <div id="canvas-container"></div>

        <!-- Properties panel -->
        <div id="properties-panel" class="hidden">
            <div id="properties-header">
                <span id="properties-title">Properties</span>
                <button id="properties-close">&times;</button>
            </div>
            <div id="properties-content"></div>
        </div>

        <!-- Preview panel -->
        <div id="preview-panel" class="hidden">
            <div id="preview-header">
                <span>Preview</span>
                <button id="preview-close">&times;</button>
            </div>
            <div id="preview-content"></div>
        </div>
    </div>

    <!-- Context menu -->
    <div id="context-menu" class="hidden">
        <div id="context-menu-items"></div>
    </div>

    <!-- File input (hidden) -->
    <input type="file" id="file-input" accept=".json" style="display:none">

    <!-- Konva.js (local) -->
    <script src="js/konva.min.js"></script>

    <!-- App modules (order matters) -->
    <script src="js/types.js"></script>
    <script src="js/api.js"></script>
    <script src="js/canvas.js"></script>
    <script src="js/port.js"></script>
    <script src="js/widget.js"></script>
    <script src="js/node.js"></script>
    <script src="js/connection.js"></script>
    <script src="js/selection.js"></script>
    <script src="js/sidebar.js"></script>
    <script src="js/properties.js"></script>
    <script src="js/toolbar.js"></script>
    <script src="js/workflow.js"></script>
    <script src="js/preview.js"></script>
    <script src="js/history.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
